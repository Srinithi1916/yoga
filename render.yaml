services:
  - type: web
    name: jeevanam360-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,https://*.netlify.app,https://jeevanam360a.netlify.app
      - key: MAIL_SMTP_AUTH
        value: "true"
      - key: MAIL_SMTP_STARTTLS_ENABLE
        value: "true"
      - key: MAIL_SMTP_STARTTLS_REQUIRED
        value: "true"
      - key: MAIL_SMTP_SSL_TRUST
        value: smtp.gmail.com
      - key: MAIL_BRAND_NAME
        value: Jeevanam 360
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_FROM
        value: srinithisrinithi09@gmail.com
      - key: CONTACT_RECEIVER_EMAIL
        value: srinithisrinithi09@gmail.com
