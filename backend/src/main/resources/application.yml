spring:
  config:
    import: optional:file:backend/.env[.properties],optional:file:.env[.properties]
  application:
    name: jeevanam360-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/jeevanam360?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://*.netlify.app,https://jeevanam360.netlify.app}
  mail:
    brand-name: ${MAIL_BRAND_NAME:Jeevanam 360}
    from-address: ${MAIL_FROM:}
    contact-recipient: ${CONTACT_RECEIVER_EMAIL:srinithisrinithi09@gmail.com}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
